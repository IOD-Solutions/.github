name: CI Node.js

  on:
    workflow_call:
      inputs:
        node-version:
          type: string
          default: "20"
        working-directory:
          type: string
          default: "."

  jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{ inputs.node-version }}
        - run: npm ci
          working-directory: ${{ inputs.working-directory }}
        - run: npx eslint .
          working-directory: ${{ inputs.working-directory }}

    typecheck:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{ inputs.node-version }}
        - run: npm ci
          working-directory: ${{ inputs.working-directory }}
        - run: npx tsc --noEmit
          working-directory: ${{ inputs.working-directory }}

    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{ inputs.node-version }}
        - run: npm ci
          working-directory: ${{ inputs.working-directory }}
        - run: npm test
          working-directory: ${{ inputs.working-directory }}

    audit:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{ inputs.node-version }}
        - run: npm ci
          working-directory: ${{ inputs.working-directory }}
        - run: npm audit --audit-level=high
          working-directory: ${{ inputs.working-directory }}